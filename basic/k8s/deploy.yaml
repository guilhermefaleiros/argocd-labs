apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic
spec:
  replicas: 4
  selector:
    matchLabels:
      app: basic
  template:
    metadata:
      labels:
        app: basic
    spec:
      containers:
        - name: basic
          image: kubedevio/web-color:blue
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: basic
spec:
  selector:
    app: basic
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
