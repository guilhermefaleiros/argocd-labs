apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluegreen
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/guilhermefaleiros/argocd-labs.git
    targetRevision: main
    path: apps/bluegreen/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: bluegreen
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
